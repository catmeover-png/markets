<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WC Markets — Crypto Dashboard</title>
<style>
:root {
  --bg: #070b14;
  --panel: rgba(14, 22, 38, .86);
  --panel2: rgba(20, 31, 52, .9);
  --border: rgba(135, 160, 255, .18);
  --text: #e8f0ff;
  --muted: #8fa3c7;
  --cyan: #36f4ff;
  --green: #38f79b;
  --purple: #a78bfa;
  --orange: #ffb86b;
  --red: #ff6b8a;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at top left, rgba(54,244,255,.18), transparent 32%),
    radial-gradient(circle at top right, rgba(167,139,250,.18), transparent 30%),
    linear-gradient(180deg, #070b14 0%, #0a1020 100%);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
  background-size: 42px 42px;
  pointer-events: none;
  mask-image: linear-gradient(to bottom, #000, transparent 75%);
}

header {
  position: sticky;
  top: 0;
  z-index: 10;
  padding: 26px 20px 18px;
  backdrop-filter: blur(18px);
  background: rgba(7, 11, 20, .78);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 1180px;
  margin: 0 auto;
}

h1 {
  margin: 0;
  font-size: 24px;
  letter-spacing: -0.7px;
}

.sub {
  margin-top: 6px;
  color: var(--muted);
  font-size: 14px;
}

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 18px;
}

input[type="search"], select, .toggle {
  border: 1px solid var(--border);
  background: rgba(12, 20, 36, .95);
  color: var(--text);
  border-radius: 12px;
  padding: 11px 13px;
  font: inherit;
}

input[type="search"] {
  flex: 1 1 260px;
  min-width: 190px;
}

input[type="search"]:focus, select:focus {
  outline: none;
  border-color: var(--cyan);
  box-shadow: 0 0 0 3px rgba(54,244,255,.12);
}

.toggle {
  cursor: pointer;
}

.toggle.active {
  color: #061018;
  background: linear-gradient(135deg, var(--cyan), var(--green));
  border-color: transparent;
  font-weight: 800;
}

main {
  position: relative;
  max-width: 1180px;
  margin: 0 auto;
  padding: 22px 20px 34px;
}

.status {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(345px, 1fr));
  gap: 16px;
}

.card {
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 16px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.045), transparent),
    var(--panel);
  box-shadow: 0 18px 50px rgba(0,0,0,.26);
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(135deg, rgba(54,244,255,.5), rgba(167,139,250,.3), transparent);
  mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  mask-composite: exclude;
  pointer-events: none;
}

.card-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.teams {
  font-size: 17px;
  font-weight: 850;
  letter-spacing: -.35px;
}

.badge {
  flex: 0 0 auto;
  font-size: 11px;
  font-weight: 800;
  padding: 5px 9px;
  border-radius: 999px;
  background: rgba(54,244,255,.12);
  color: var(--cyan);
  border: 1px solid rgba(54,244,255,.25);
}

.meta {
  min-height: 20px;
  margin: 8px 0 13px;
  color: var(--muted);
  font-size: 13px;
}

.sel {
  color: var(--green);
  font-weight: 800;
}

.rows {
  display: grid;
  gap: 8px;
}

.row {
  display: grid;
  grid-template-columns: 112px 1fr auto;
  align-items: center;
  gap: 9px;
  padding: 10px;
  border-radius: 14px;
  background: var(--panel2);
  border: 1px solid var(--border);
}

.row[data-platform="polymarket"] {
  border-color: rgba(54,244,255,.32);
  background: linear-gradient(90deg, rgba(54,244,255,.13), rgba(20,31,52,.9));
}
.row[data-platform="limitless"] {
  border-color: rgba(56,247,155,.32);
  background: linear-gradient(90deg, rgba(56,247,155,.13), rgba(20,31,52,.9));
}
.row[data-platform="adi"] {
  border-color: rgba(167,139,250,.34);
  background: linear-gradient(90deg, rgba(167,139,250,.15), rgba(20,31,52,.9));
}
.row[data-platform="kalshi"] {
  border-color: rgba(255,184,107,.34);
  background: linear-gradient(90deg, rgba(255,184,107,.15), rgba(20,31,52,.9));
}

.plat {
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: .45px;
}

.vol {
  font-size: 15px;
  text-align: right;
  font-weight: 800;
}

.vol small {
  color: var(--muted);
  font-weight: 500;
}

.go {
  text-decoration: none;
  font-size: 12px;
  font-weight: 800;
  padding: 7px 10px;
  border-radius: 10px;
  color: var(--text);
  border: 1px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.06);
}

.go:hover {
  background: rgba(54,244,255,.15);
  border-color: var(--cyan);
}

.totals {
  margin-top: 13px;
  padding-top: 12px;
  border-top: 1px dashed rgba(255,255,255,.14);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  font-size: 12px;
  color: var(--muted);
}

.totals span {
  padding: 8px;
  border-radius: 12px;
  background: rgba(255,255,255,.045);
}

.totals b {
  display: block;
  margin-top: 2px;
  color: var(--text);
  font-size: 14px;
}

footer {
  text-align: center;
  color: var(--muted);
  font-size: 12px;
  padding: 26px;
}

a.repo {
  color: var(--cyan);
}

.err {
  color: var(--red);
}
</style>
</head>

<body>
<header>
  <div class="header-inner">
    <h1>WC Markets — Cross-Platform Liquidity</h1>
    <div class="sub">Polymarket · Limitless · ADI · Kalshi — объёмы, совпадения и ссылки по маркетам</div>

    <div class="controls">
      <input id="search" type="search" placeholder="Поиск по команде, матчу или маркету" />
      <select id="sort">
        <option value="usd_volume_total">Сорт.: объём USD всего</option>
        <option value="usd_volume_24h">Сорт.: объём USD 24ч</option>
        <option value="platform_count">Сорт.: число платформ</option>
      </select>
      <button id="multiToggle" class="toggle active">2+ платформ</button>
      <button id="refresh" class="toggle">Обновить</button>
    </div>
  </div>
</header>

<main>
  <div id="status" class="status">Загрузка…</div>
  <div id="grid" class="grid"></div>
</main>

<footer>
  Supabase data feed · parser <a class="repo" href="#">wc-parser</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = "https://emspjcucgfewlgrhgwnz.supabase.co";
const SUPABASE_ANON_KEY = "PASTE_YOUR_ANON_KEY_HERE";
const TABLE = "market_groups";

const PLATFORM_LABEL = {
  polymarket: "Polymarket",
  limitless: "Limitless",
  adi: "ADI",
  kalshi: "Kalshi",
};

const TYPE_LABEL = {
  match_winner: "Победитель",
  correct_score: "Точный счёт",
  total_goals: "Тотал голов",
  btts: "Обе забьют",
};

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const el = {
  grid: document.getElementById("grid"),
  status: document.getElementById("status"),
  search: document.getElementById("search"),
  sort: document.getElementById("sort"),
  multi: document.getElementById("multiToggle"),
  refresh: document.getElementById("refresh"),
};

let ALL = [];
let multiOnly = true;

function fmtVol(n) {
  if (n === null || n === undefined) return "—";
  const v = Number(n);
  if (!isFinite(v)) return "—";
  if (v >= 1e9) return (v / 1e9).toFixed(2).replace(/\.0+$/, "") + "B";
  if (v >= 1e6) return (v / 1e6).toFixed(2).replace(/\.0+$/, "") + "M";
  if (v >= 1e3) return (v / 1e3).toFixed(1).replace(/\.0$/, "") + "K";
  return v.toFixed(0);
}

function platformRow(plat, volumes, urls) {
  const v = (volumes && volumes[plat]) || {};
  const url = (urls && urls[plat]) || null;
  const cur = v.currency ? `<small> ${escapeHtml(v.currency)}</small>` : "";

  const link = url
    ? `<a class="go" href="${escapeAttr(url)}" target="_blank" rel="noopener">open ↗</a>`
    : `<span class="go" style="opacity:.35;border-style:dashed;cursor:default">нет</span>`;

  return `
    <div class="row" data-platform="${escapeAttr(plat)}">
      <span class="plat">${escapeHtml(PLATFORM_LABEL[plat] || plat)}</span>
      <span class="vol">${fmtVol(v.total)}${cur}</span>
      ${link}
    </div>`;
}

function card(g) {
  const teams = `${escapeHtml(g.team_a || "?")} — ${escapeHtml(g.team_b || "?")}`;
  const type = TYPE_LABEL[g.market_type] || g.market_type || "—";

  const sel = g.selection && !["na", "winner", "cs", "ou"].includes(g.selection)
    ? `<span class="sel">${escapeHtml(g.selection)}</span>`
    : "";

  const platforms = Array.isArray(g.platforms) ? g.platforms : [];
  const rows = platforms.map(p => platformRow(p, g.volumes, g.urls)).join("");
  const title = g.sample_title ? escapeHtml(g.sample_title) : "";

  return `
    <div class="card">
      <div class="card-top">
        <span class="teams">${teams}</span>
        <span class="badge">${escapeHtml(type)}</span>
      </div>

      <div class="meta">${sel}${sel && title ? " · " : ""}${title}</div>

      <div class="rows">${rows}</div>

      <div class="totals">
        <span>USD всего <b>${fmtVol(g.usd_volume_total)}</b></span>
        <span>24ч <b>${fmtVol(g.usd_volume_24h)}</b></span>
        <span>Платформ <b>${g.platform_count ?? platforms.length}</b></span>
      </div>
    </div>`;
}

function render() {
  const q = el.search.value.trim().toLowerCase();
  const sortKey = el.sort.value;
  let rows = ALL.slice();

  if (multiOnly) rows = rows.filter(g => (g.platform_count ?? 0) >= 2);

  if (q) {
    rows = rows.filter(g =>
      (g.team_a || "").toLowerCase().includes(q) ||
      (g.team_b || "").toLowerCase().includes(q) ||
      (g.sample_title || "").toLowerCase().includes(q)
    );
  }

  rows.sort((a, b) => (Number(b[sortKey]) || 0) - (Number(a[sortKey]) || 0));

  el.grid.innerHTML = rows.map(card).join("");

  el.status.textContent = rows.length
    ? `Показано маркетов: ${rows.length}`
    : "Ничего не найдено по текущим фильтрам.";
}

async function load() {
  el.status.textContent = "Загрузка…";
  el.status.classList.remove("err");

  try {
    const { data, error } = await sb
      .from(TABLE)
      .select("*")
      .eq("is_active", true)
      .order("usd_volume_total", { ascending: false })
      .limit(1000);

    if (error) throw error;

    ALL = data || [];
    render();
  } catch (e) {
    el.status.textContent = "Ошибка загрузки: " + (e.message || e);
    el.status.classList.add("err");
    el.grid.innerHTML = "";
    console.error(e);
  }
}

function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, m =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])
  );
}

function escapeAttr(s) {
  return escapeHtml(s);
}

el.search.addEventListener("input", render);
el.sort.addEventListener("change", render);
el.refresh.addEventListener("click", load);

el.multi.addEventListener("click", () => {
  multiOnly = !multiOnly;
  el.multi.classList.toggle("active", multiOnly);
  render();
});

load();
</script>
</body>
</html>
